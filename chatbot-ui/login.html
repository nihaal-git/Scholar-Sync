<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — ScholarSync</title>
  <meta name="description" content="Log in to ScholarSync — AI-powered automated literature review assistant" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0a0a14;
      --bg-secondary: #0f0f1a;
      --bg-card: rgba(20, 20, 40, 0.7);
      --bg-input: rgba(255, 255, 255, 0.05);
      --accent: #6c5ce7;
      --accent-light: #a388ee;
      --accent-glow: rgba(108, 92, 231, 0.2);
      --accent-gradient: linear-gradient(135deg, #6c5ce7, #a388ee);
      --success: #00b894;
      --danger: #e17055;
      --text-primary: #e8ecf4;
      --text-secondary: #8892a4;
      --text-muted: #5a6478;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(108, 92, 231, 0.5);
      --shadow-glow: 0 0 60px rgba(108, 92, 231, 0.15);
      --radius: 16px;
      --radius-sm: 12px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html,
    body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ─── Background Effects ─── */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 25% 25%, rgba(108, 92, 231, 0.06) 0%, transparent 50%),
        radial-gradient(circle at 75% 75%, rgba(163, 136, 238, 0.04) 0%, transparent 50%);
      z-index: 0;
    }

    .bg-grid::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── Floating Orbs ─── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
      z-index: 0;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(108, 92, 231, 0.15);
      top: -100px;
      right: -50px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 250px;
      height: 250px;
      background: rgba(163, 136, 238, 0.1);
      bottom: -80px;
      left: -60px;
      animation-delay: -7s;
    }

    .orb-3 {
      width: 180px;
      height: 180px;
      background: rgba(108, 92, 231, 0.08);
      top: 50%;
      left: 50%;
      animation-delay: -14s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -20px) scale(1.05); }
      50% { transform: translate(-20px, 30px) scale(0.95); }
      75% { transform: translate(20px, 20px) scale(1.02); }
    }

    /* ─── Container ─── */
    .auth-container {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ─── Card ─── */
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      box-shadow: var(--shadow-glow), 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: cardEntry 0.6s ease-out;
    }

    @keyframes cardEntry {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ─── Logo ─── */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--accent-gradient);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(108, 92, 231, 0.35);
    }

    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .auth-subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14.5px;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* ─── Form ─── */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color var(--transition);
    }

    .form-input {
      width: 100%;
      padding: 13px 14px 13px 44px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 14.5px;
      color: var(--text-primary);
      outline: none;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    .form-input:focus {
      border-color: var(--border-focus);
      background: rgba(108, 92, 231, 0.04);
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
    }

    .form-input:focus ~ .input-icon,
    .input-wrapper:focus-within .input-icon {
      color: var(--accent-light);
    }

    /* ─── Password Toggle ─── */
    .password-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color var(--transition);
    }

    .password-toggle:hover {
      color: var(--text-secondary);
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
    }

    /* ─── Remember Me ─── */
    .form-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .remember-me input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--bg-input);
      border: 1.5px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      position: relative;
      transition: all var(--transition);
    }

    .remember-me input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .remember-me input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .remember-me span {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ─── Submit Button ─── */
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent-gradient);
      border: none;
      border-radius: var(--radius-sm);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
      overflow: hidden;
      letter-spacing: 0.2px;
    }

    .auth-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(108, 92, 231, 0.4);
    }

    .auth-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .auth-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .auth-btn .btn-text { transition: opacity 0.2s; }
    .auth-btn .btn-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .auth-btn.loading .btn-text { opacity: 0; }
    .auth-btn.loading .btn-loader { opacity: 1; }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Error/Success Messages ─── */
    .auth-message {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13.5px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      animation: messageSlide 0.3s ease-out;
    }

    .auth-message.visible { display: flex; }

    .auth-message.error {
      background: rgba(225, 112, 85, 0.12);
      border: 1px solid rgba(225, 112, 85, 0.25);
      color: #f0907c;
    }

    .auth-message.success {
      background: rgba(0, 184, 148, 0.12);
      border: 1px solid rgba(0, 184, 148, 0.25);
      color: #4cd9b4;
    }

    @keyframes messageSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }

    .shake { animation: shake 0.4s ease-out; }

    /* ─── Footer Link ─── */
    .auth-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-light);
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition);
    }

    .auth-footer a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    /* ─── Divider ─── */
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px 28px;
        border-radius: 20px;
      }

      .logo-text { font-size: 20px; }
      .auth-subtitle { font-size: 13.5px; }
    }
  </style>
</head>

<body>

  <!-- Background Effects -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z"/>
          </svg>
        </div>
        <span class="logo-text">ScholarSync</span>
      </div>
      <p class="auth-subtitle">Sign in to your research workspace</p>

      <!-- Messages -->
      <div class="auth-message" id="auth-message">
        <span id="auth-message-icon"></span>
        <span id="auth-message-text"></span>
      </div>

      <!-- Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/>
            </svg>
            <input type="text" id="username" class="form-input" placeholder="Enter your username" autocomplete="username" required autofocus />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/>
            </svg>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required style="padding-right: 48px" />
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
              <svg id="eye-icon" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-extras">
          <label class="remember-me">
            <input type="checkbox" id="remember-me" />
            <span>Remember me</span>
          </label>
        </div>

        <button type="submit" class="auth-btn" id="login-btn">
          <span class="btn-text">Sign In</span>
          <div class="btn-loader"><div class="spinner"></div></div>
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create one</a>
      </div>
    </div>
  </div>

  <script>
    // ── Check if already logged in ──
    (function() {
      const token = getCookie('access_token');
      if (token) {
        window.location.href = '/';
      }
    })();

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    function showMessage(type, text) {
      const el = document.getElementById('auth-message');
      const iconEl = document.getElementById('auth-message-icon');
      const textEl = document.getElementById('auth-message-text');

      el.className = 'auth-message visible ' + type;
      iconEl.textContent = type === 'error' ? '⚠️' : '✅';
      textEl.textContent = text;

      if (type === 'error') {
        el.classList.add('shake');
        setTimeout(() => el.classList.remove('shake'), 500);
      }
    }

    function hideMessage() {
      document.getElementById('auth-message').className = 'auth-message';
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88"/>
        </svg>`;
      } else {
        input.type = 'password';
        btn.innerHTML = `<svg fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>`;
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      hideMessage();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');

      if (!username || !password) {
        showMessage('error', 'Please fill in all fields.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',  // Include cookies
        });

        const data = await resp.json();

        if (!resp.ok) {
          const errorMsg = data.detail || 'Login failed. Please try again.';
          // Handle Pydantic validation errors
          if (Array.isArray(data.detail)) {
            showMessage('error', data.detail.map(d => d.msg).join('. '));
          } else {
            showMessage('error', errorMsg);
          }
          return;
        }

        // Success — store token backup in localStorage if "Remember me" checked
        if (document.getElementById('remember-me').checked) {
          localStorage.setItem('scholarsync_token', data.access_token);
        }
        localStorage.setItem('scholarsync_username', data.username);

        showMessage('success', 'Login successful! Redirecting...');
        setTimeout(() => { window.location.href = '/'; }, 600);

      } catch (err) {
        showMessage('error', 'Connection error. Is the server running?');
        console.error('Login error:', err);
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && e.target.tagName !== 'BUTTON') {
        document.getElementById('login-form').requestSubmit();
      }
    });
  </script>
</body>

</html>
